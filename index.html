<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>0xzoowa's space</title>
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --teal: #008080;
        --navy: #000080;
        --navy-hi: #1084d0;
        --silver: #c0c0c0;
        --silver-dark: #808080;
        --white: #ffffff;
        --black: #000000;
        --win-bg: #d4d0c8;
        --titlebar-h: 28px;
        --border-light: #ffffff;
        --border-dark: #808080;
        --border-darker: #404040;
        --shadow: rgba(0, 0, 0, 0.4);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background: #0d1117;
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 13px;
        position: relative;
      }

      /* ── DESKTOP ── */
      #desktop {
        width: 100vw;
        height: 100vh;
        position: relative;
        overflow: hidden;
        background: #0d1117;
      }

      /* wallpaper canvas sits behind everything */
      #wallpaper {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }
      .icon {
        position: absolute;
        z-index: 2;
      }

      /* ── TASKBAR ── */
      #taskbar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 34px;
        background: var(--silver);
        border-top: 2px solid var(--border-light);
        display: flex;
        align-items: center;
        padding: 0 6px;
        gap: 4px;
        z-index: 9999;
        box-shadow: 0 -1px 0 var(--border-dark);
      }

      #start-btn {
        background: var(--silver);
        border-top: 2px solid var(--border-light);
        border-left: 2px solid var(--border-light);
        border-bottom: 2px solid var(--border-darker);
        border-right: 2px solid var(--border-darker);
        padding: 3px 10px;
        font-family: "VT323", monospace;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        color: var(--black);
        user-select: none;
        white-space: nowrap;
      }
      #start-btn:active {
        border-top: 2px solid var(--border-darker);
        border-left: 2px solid var(--border-darker);
        border-bottom: 2px solid var(--border-light);
        border-right: 2px solid var(--border-light);
      }

      #clock {
        margin-left: auto;
        border-top: 2px solid var(--border-dark);
        border-left: 2px solid var(--border-dark);
        border-bottom: 2px solid var(--border-light);
        border-right: 2px solid var(--border-light);
        padding: 3px 8px;
        font-size: 12px;
        white-space: nowrap;
      }

      .taskbar-btn {
        background: var(--silver);
        border-top: 2px solid var(--border-light);
        border-left: 2px solid var(--border-light);
        border-bottom: 2px solid var(--border-darker);
        border-right: 2px solid var(--border-darker);
        padding: 2px 8px;
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        cursor: pointer;
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--black);
      }
      .taskbar-btn.active {
        border-top: 2px solid var(--border-darker);
        border-left: 2px solid var(--border-darker);
        border-bottom: 2px solid var(--border-light);
        border-right: 2px solid var(--border-light);
        background: var(--silver-dark);
        color: var(--white);
      }

      /* ── DESKTOP ICONS ── */
      .icon {
        position: absolute;
        color: white;
        text-align: center;
        cursor: grab;
        width: 72px;
        padding: 4px;
        border: 2px solid transparent;
        border-radius: 2px;
        transition:
          border-color 0.1s,
          box-shadow 0.1s;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      .icon:hover {
        border-color: rgba(255, 255, 255, 0.45);
      }
      .icon:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.5);
      }
      .icon.selected {
        background: rgba(0, 0, 128, 0.45);
        border-color: rgba(255, 255, 255, 0.75);
      }
      .icon.dragging {
        cursor: grabbing;
        opacity: 0.85;
        box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.5);
        z-index: 8000 !important;
      }

      /* SVG C badge */
      .icon .ico-wrap {
        width: 48px;
        height: 48px;
        margin: 0 auto 4px;
        position: relative;
      }
      .icon .ico-wrap svg {
        width: 48px;
        height: 48px;
        filter: drop-shadow(1px 2px 3px rgba(0, 0, 0, 0.55));
      }
      /* tiny emoji badge bottom-right */
      .icon .ico-badge {
        position: absolute;
        bottom: -2px;
        right: -4px;
        font-size: 16px;
        line-height: 1;
        filter: drop-shadow(0 1px 2px #000);
      }

      .icon span {
        font-family: "VT323", monospace;
        font-size: 14px;
        display: block;
        text-shadow: 1px 1px 2px #000;
        word-break: break-word;
        line-height: 1.2;
      }

      /* ── WINDOW ── */
      .window {
        position: absolute;
        background: var(--win-bg);
        border-top: 2px solid var(--border-light);
        border-left: 2px solid var(--border-light);
        border-bottom: 2px solid var(--border-darker);
        border-right: 2px solid var(--border-darker);
        min-width: 280px;
        max-width: calc(100vw - 20px);
        display: flex;
        flex-direction: column;
        box-shadow: 4px 4px 0 var(--shadow);
      }

      .title-bar {
        background: linear-gradient(to right, var(--navy), var(--navy-hi));
        color: var(--white);
        padding: 4px 6px;
        cursor: move;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 6px;
        min-height: var(--titlebar-h);
        flex-shrink: 0;
        user-select: none;
        -webkit-touch-callout: none;
      }

      .title-bar .title-text {
        font-family: "VT323", monospace;
        font-size: 16px;
        letter-spacing: 0.5px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      .title-bar .win-btns {
        display: flex;
        gap: 3px;
        flex-shrink: 0;
      }

      .win-btn {
        background: var(--silver);
        border-top: 2px solid var(--border-light);
        border-left: 2px solid var(--border-light);
        border-bottom: 2px solid var(--border-darker);
        border-right: 2px solid var(--border-darker);
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 11px;
        color: var(--black);
        font-weight: bold;
        flex-shrink: 0;
        line-height: 1;
        -webkit-tap-highlight-color: transparent;
      }
      .win-btn:active {
        border-top: 2px solid var(--border-darker);
        border-left: 2px solid var(--border-darker);
        border-bottom: 2px solid var(--border-light);
        border-right: 2px solid var(--border-light);
      }

      .window-body {
        border-top: 2px solid var(--border-dark);
        border-left: 2px solid var(--border-dark);
        border-bottom: 1px solid var(--border-light);
        border-right: 1px solid var(--border-light);
        margin: 2px;
        background: #f5f4ef;
        overflow-y: auto;
        flex: 1;
      }

      .content {
        padding: 14px 16px;
        line-height: 1.7;
        color: #111;
      }

      .content h3 {
        font-family: "VT323", monospace;
        font-size: 20px;
        margin-bottom: 8px;
        color: var(--navy);
        border-bottom: 1px solid var(--silver-dark);
        padding-bottom: 4px;
      }

      .content p {
        margin-bottom: 8px;
        font-size: 13px;
      }
      .content ul {
        padding-left: 20px;
      }
      .content li {
        margin-bottom: 6px;
      }

      .content a {
        color: var(--navy);
        text-decoration: underline;
        cursor: pointer;
      }
      .content a:hover {
        color: #0000ff;
      }

      /* prompt-style about */
      .prompt-line {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 5px;
        font-size: 13px;
      }
      .prompt-line .label {
        color: #008080;
        font-weight: bold;
      }
      .prompt-line .val {
        color: #111;
      }

      .prompt-footer {
        margin-top: 12px;
        font-size: 12px;
        color: #555;
        border-top: 1px dashed var(--silver-dark);
        padding-top: 8px;
      }

      /* resize handle */
      .resize-handle {
        width: 14px;
        height: 14px;
        position: absolute;
        right: 0;
        bottom: 0;
        cursor: se-resize;
        background: var(--win-bg);
        border-top: 1px solid var(--border-dark);
        border-left: 1px solid var(--border-dark);
      }
      .resize-handle::after {
        content: "";
        display: block;
        width: 10px;
        height: 10px;
        background: repeating-linear-gradient(
          -45deg,
          var(--border-dark),
          var(--border-dark) 1px,
          transparent 1px,
          transparent 3px
        );
        margin: 2px;
      }

      /* ── MOBILE DRAWER (bottom sheet) ── */
      @media (max-width: 600px) {
        .window {
          position: fixed !important;
          left: 0 !important;
          right: 0 !important;
          bottom: 34px !important;
          top: auto !important;
          width: 100% !important;
          max-width: 100% !important;
          max-height: 70vh;
          border-radius: 0;
          box-shadow: 0 -4px 16px var(--shadow);
          transform: translateY(100%);
          transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
          z-index: 100;
        }
        .window.open {
          transform: translateY(0);
        }
        .window .resize-handle {
          display: none;
        }
        .title-bar {
          cursor: default;
        }
        .window-body {
          max-height: calc(70vh - var(--titlebar-h) - 8px);
        }

        .icon {
          width: 60px;
        }
        .icon .ico {
          font-size: 30px;
        }
        .icon span {
          font-size: 12px;
        }

        #taskbar {
          height: 40px;
        }
        .taskbar-btn {
          max-width: 100px;
          font-size: 10px;
        }
      }

      /* Minimized state */
      .window.minimized {
        display: none;
      }

      /* ── START MENU ── */
      #start-menu {
        position: fixed;
        bottom: 34px;
        left: 0;
        width: 240px;
        background: var(--silver);
        border-top: 2px solid var(--border-light);
        border-left: 2px solid var(--border-light);
        border-right: 2px solid var(--border-darker);
        border-bottom: 2px solid var(--border-darker);
        box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.4);
        z-index: 99999;
        display: none;
        flex-direction: column;
        overflow: hidden;
        transform-origin: bottom left;
      }
      #start-menu.open {
        display: flex;
        animation: menuPop 0.12s ease-out;
      }
      @keyframes menuPop {
        from {
          opacity: 0;
          transform: scaleY(0.88);
        }
        to {
          opacity: 1;
          transform: scaleY(1);
        }
      }

      #start-menu .sm-sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 28px;
        background: linear-gradient(to top, var(--navy), #1a50a0);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 6px;
      }
      #start-menu .sm-sidebar span {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        font-family: "VT323", monospace;
        font-size: 17px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 2px;
        user-select: none;
      }

      #start-menu .sm-items {
        margin-left: 28px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .sm-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 12px;
        cursor: pointer;
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        color: var(--black);
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        white-space: nowrap;
        user-select: none;
      }
      .sm-item:hover,
      .sm-item:focus {
        background: var(--navy);
        color: white;
        outline: none;
      }
      .sm-item .sm-ico {
        font-size: 18px;
        width: 22px;
        text-align: center;
        flex-shrink: 0;
      }
      .sm-divider {
        height: 1px;
        background: var(--border-dark);
        margin: 3px 6px;
        flex-shrink: 0;
      }
      .sm-item.sm-shutdown {
        border-top: 2px solid var(--border-dark);
        border-bottom: none;
      }

      /* Selection highlight */
      ::selection {
        background: var(--navy);
        color: white;
      }
    </style>
  </head>

    <script>
      /* =========================================================
   START MENU
========================================================= */
      const startMenu = document.getElementById("start-menu");
      const startBtn = document.getElementById("start-btn");

      function toggleStartMenu(e) {
        e.stopPropagation();
        startMenu.classList.toggle("open");
        startBtn.classList.toggle("active");
      }
      function closeStartMenu() {
        startMenu.classList.remove("open");
        startBtn.classList.remove("active");
      }
      startBtn.addEventListener("click", toggleStartMenu);
      document.addEventListener("click", (e) => {
        if (!startMenu.contains(e.target) && e.target !== startBtn)
          closeStartMenu();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeStartMenu();
      });

      function smOpen(type) {
        closeStartMenu();
        openWindow(type);
      }
      function smGithub() {
        closeStartMenu();
        window.open("https://github.com/0xzoowa", "_blank");
      }
      function smShutdown() {
        closeStartMenu();
        document.body.style.transition = "opacity 0.6s";
        document.body.style.opacity = "0";
        setTimeout(() => {
          document.body.innerHTML = `<div style="

      <div>It is now safe to turn off your computer.</div>
      <div style="font-size:14px;opacity:0.45;font-family:'Share Tech Mono',monospace">(refresh to reboot)</div>
    </div>`;
          document.body.style.opacity = "1";
        }, 600);
      }

              content: `
              <p><em>Engineering Notes — July, 2025</em></p>
              <h3>From High-Level Code to Machine Instructions</h3>

  <h4>1. The Compiler — Translating High-Level Intent</h4>

  <p>The first stage of the pipeline is the Jack compiler.</p>

  <p>Jack is a small high-level language designed for the Nand2Tetris course. It resembles languages like Java or C but is intentionally simplified so that its entire compiler can be implemented by a single developer.</p>

  <p>At a high level, the compiler performs three tasks:</p>

  <p><strong>Lexical Analysis (Tokenization)</strong><br>
  The compiler reads the raw source code and breaks it into tokens: keywords, identifiers, symbols, constants, and strings.</p>

  <p><strong>Parsing (Syntax Analysis)</strong><br>
  These tokens are checked against the grammar of the language to ensure the program is syntactically valid.</p>

  <p><strong>Code Generation</strong><br>
  Instead of producing machine code directly, the compiler outputs VM instructions targeting a stack-based virtual machine.</p>

  <p>For example, a simple Jack statement like this:</p>

  <pre><code>let x = y + 2;</code></pre>

  <p>might produce the following VM instructions:</p>

  <pre><code>push local 1
push constant 2
add
pop local 0</code></pre>

  <p>At first glance, this output may look strange. Why introduce a virtual machine layer instead of compiling directly to hardware instructions?</p>

  <p>The answer becomes clearer in the next stage.</p>


  <h4>2. The Virtual Machine — A Portable Execution Model</h4>

  <p>The VM Translator sits between the high-level language and the target hardware.</p>

  <p>Instead of generating machine code directly, the compiler targets a stack-based virtual machine abstraction. The VM provides a standardized instruction set that represents common programming constructs such as arithmetic operations, memory access, branching, and function calls.</p>

  <p>For example:</p>

  <pre><code>push constant 7
push constant 8
add</code></pre>

  <p>This sequence expresses a computation independent of any specific CPU architecture.</p>

  <p>The VM translator then converts these instructions into Hack assembly, which directly manipulates the Hack computer’s memory and stack.</p>

  <p>A simplified translation might look like this:</p>

  <pre><code>@7
D=A
@SP
A=M
M=D
@SP
M=M+1</code></pre>

  <p>This stage was particularly illuminating for me because it revealed how many high-level operations ultimately reduce to simple stack manipulations and memory operations.</p>

  <p>Function calls, variable storage, and arithmetic all boil down to carefully orchestrated changes to memory.</p>

  <p>However, the output of this stage is still assembly, which is readable by humans but not by the processor itself.</p>

  <p>That leads to the final step.</p>


  <h4>3. The Assembler — Converting Symbols to Binary</h4>

  <p>The assembler translates Hack assembly into 16-bit machine instructions that the Hack CPU can execute.</p>

  <p>For example:</p>

  <pre><code>@2
D=A</code></pre>

  <p>becomes:</p>

  <pre><code>0000000000000010
1110110000010000</code></pre>

  <p>Unlike assembly code, which uses symbolic names and readable mnemonics, machine code is simply a sequence of binary instructions understood by the processor’s hardware circuits.</p>

  <p>Implementing the assembler required solving a subtle problem: symbol resolution.</p>

  <p>Assembly programs often contain labels and variables:</p>

  <pre><code>(LOOP)
@i
M=M+1
@LOOP
0;JMP</code></pre>

  <p>To handle these, the assembler performs a two-pass translation process:</p>

  <p>First pass: record the locations of labels.<br>
  Second pass: translate instructions and assign memory addresses to variables.</p>

  <p>This step finally produces a <code>.hack</code> file — pure binary instructions ready to run on the Hack computer.</p>


  <h4>Putting It All Together</h4>

  <p>Viewed as a pipeline, the entire process looks like this:</p>

  <pre><code>Jack Source Code (.jack)
        ↓
Jack Compiler
        ↓
Virtual Machine Code (.vm)
        ↓
VM Translator
        ↓
Hack Assembly (.asm)
        ↓
Assembler
        ↓
Machine Code (.hack)</code></pre>

  <p>Each stage removes a layer of abstraction and moves the program closer to the hardware.</p>

  <p>What begins as expressive, human-readable code eventually becomes a sequence of binary instructions that manipulate registers, memory, and the stack.</p>


  <h4>Open Questions and Future Exploration</h4>

  <p>While implementing these tools clarified many aspects of compilation, it also raised new questions that point toward deeper areas of study.</p>

  <p>For example:</p>

  <p>
  • How do real-world compilers like those for C or Rust optimize the generated code?<br>
  • How are register allocation and instruction scheduling handled on modern CPUs?<br>
  • How do linkers combine multiple compiled files into a single executable?<br>
  • How does the operating system load that executable into memory and start execution?
  </p>

  <p>The Nand2Tetris toolchain is intentionally minimal, but it reveals the core ideas underlying real systems.</p>

  <p>Understanding this pipeline transformed compilation from something mysterious into a sequence of understandable transformations.</p>`,

          ox = e.clientX - win.offsetLeft;

        });

        document.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          const x = Math.max(
            0,

          const y = Math.max(

          win.style.left = x + "px";

        document.addEventListener("mouseup", () => {

              if (!cell) return;
              ctx.fillStyle = PALETTE[cell];
              ctx.fillRect(ox + cx2 * pw, oy + ry * ph, pw - 0.5, ph - 0.5);
            });
          });
        }

        // ── Moon ──
        function drawMoon() {
          const mx = W * 0.82,
            my = H * 0.14;
          const r = Math.min(W, H) * 0.055;
          // glow
          const grd = ctx.createRadialGradient(mx, my, 0, mx, my, r * 3);
          grd.addColorStop(0, "rgba(200,230,255,0.18)");
          grd.addColorStop(1, "rgba(200,230,255,0)");
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(mx, my, r * 3, 0, Math.PI * 2);
          ctx.fill();
          // moon body
          ctx.fillStyle = "#d8eeff";
          ctx.beginPath();
          ctx.arc(mx, my, r, 0, Math.PI * 2);
          ctx.fill();
          // craters
          ctx.fillStyle = "rgba(150,190,230,0.5)";
          [
            [0.3, -0.2, 0.15],
            [-0.25, 0.1, 0.1],
            [0.1, 0.35, 0.08],
          ].forEach(([dx, dy, cr]) => {
            ctx.beginPath();
            ctx.arc(mx + dx * r, my + dy * r, cr * r, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        // ── Main draw loop ──
        function draw() {
          t += 0.012;
          ctx.clearRect(0, 0, W, H);

          // Sky gradient
          const sky = ctx.createLinearGradient(0, 0, 0, H * 0.65);
          sky.addColorStop(0, "#04040f");
          sky.addColorStop(0.4, "#0a0a2a");
          sky.addColorStop(1, "#12183a");
          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, W, H * 0.65);

          // Ground
          const gnd = ctx.createLinearGradient(0, H * 0.62, 0, H);
          gnd.addColorStop(0, "#080814");
          gnd.addColorStop(1, "#050508");
          ctx.fillStyle = gnd;
          ctx.fillRect(0, H * 0.62, W, H * 0.38);

          drawMoon();

          // Stars twinkle
          stars.forEach((s) => {
            const twinkle = 0.5 + 0.5 * Math.sin(t * s.speed * 8 + s.phase);
            ctx.globalAlpha = twinkle * 0.85;
            ctx.fillStyle = s.color;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
          });
          ctx.globalAlpha = 1;

          drawGrid();
          drawCity(H * 0.625);

          // Scanline overlay on sky
          ctx.fillStyle = "rgba(0,0,0,0.06)";
          for (let y = 0; y < H * 0.65; y += 4) {
            ctx.fillRect(0, y, W, 1);
          }

          // Code particles
          ctx.save();
          particles.forEach((p) => {
            p.x += p.vx;
            p.y += p.vy;
            if (p.y < -20) {
              p.y = H * 0.9;
              p.x = Math.random() * W;
            }
            if (p.x < -30) p.x = W + 10;
            if (p.x > W + 30) p.x = -10;
            ctx.globalAlpha = p.alpha * (0.6 + 0.4 * Math.sin(t * 2 + p.x));
            ctx.fillStyle = p.color;
            ctx.font = `bold ${p.size}px 'Share Tech Mono', monospace`;
            ctx.fillText(p.text, p.x, p.y);
          });
          ctx.globalAlpha = 1;
          ctx.restore();

          // Avatar — center-bottom area, gentle bob
          const avatarScale = Math.max(10, Math.min(W, H) * 0.028);
          const bob = Math.sin(t * 1.4) * avatarScale * 0.4;
          const avatarX = W * 0.5;
          const avatarY = H * 0.58;
          drawAvatar(avatarX, avatarY, avatarScale, bob);

          // shadow under avatar
          ctx.save();
          ctx.globalAlpha = 0.25 + 0.05 * Math.sin(t * 1.4);
          ctx.fillStyle = "#000";
          const sw = avatarScale * 10;
          ctx.beginPath();
          ctx.ellipse(
            avatarX,
            H * 0.625,
            sw * 0.5,
            sw * 0.1,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();
          ctx.restore();

          // Horizon glow
          const hgrd = ctx.createLinearGradient(0, H * 0.58, 0, H * 0.66);
          hgrd.addColorStop(0, "rgba(26,111,212,0.0)");
          hgrd.addColorStop(0.5, "rgba(26,111,212,0.12)");
          hgrd.addColorStop(1, "rgba(26,111,212,0.0)");
          ctx.fillStyle = hgrd;
          ctx.fillRect(0, H * 0.58, W, H * 0.08);

          raf = requestAnimationFrame(draw);
        }

        function resize() {
          W = canvas.width = window.innerWidth;
          H = canvas.height = window.innerHeight;
          initStars();
          initParticles();
        }

        window.addEventListener("resize", resize);
        resize();
        draw();
      })();

      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, "0");
        const m = String(now.getMinutes()).padStart(2, "0");
        document.getElementById("clock").textContent = h + ":" + m;
      }
      updateClock();
      setInterval(updateClock, 15000);

      /* =========================================================


/* =========================================================
   DRAGGABLE ICONS
========================================================= */
      (function initIconDrag() {
        const icons = document.querySelectorAll(".icon");

        icons.forEach((icon) => {
          let startX, startY, origLeft, origTop;
          let moved = false;
          const DRAG_THRESHOLD = 5;

          // ── MOUSE ──
          icon.addEventListener("mousedown", (e) => {
            if (e.button !== 0) return;
            startX = e.clientX;
            startY = e.clientY;
            origLeft = icon.offsetLeft;
            origTop = icon.offsetTop;
            moved = false;

            function onMove(e) {
              const dx = e.clientX - startX;
              const dy = e.clientY - startY;
              if (!moved && Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
              moved = true;
              icon.classList.add("dragging");
              const nx = Math.max(
                0,
                Math.min(origLeft + dx, window.innerWidth - icon.offsetWidth),
              );
              const ny = Math.max(
                0,
                Math.min(
                  origTop + dy,
                  window.innerHeight - 34 - icon.offsetHeight,
                ),
              );
              icon.style.left = nx + "px";
              icon.style.top = ny + "px";
            }

            function onUp() {
              document.removeEventListener("mousemove", onMove);
              document.removeEventListener("mouseup", onUp);
              icon.classList.remove("dragging");
              if (!moved) {
                // treat as click → open window
                openWindow(icon.dataset.target);
              }
            }

            document.addEventListener("mousemove", onMove);
            document.addEventListener("mouseup", onUp);
            e.preventDefault();
          });

          // keyboard activation
          icon.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ")
              openWindow(icon.dataset.target);
          });

          // ── TOUCH ──
          icon.addEventListener(
            "touchstart",
            (e) => {
              const t = e.touches[0];
              startX = t.clientX;
              startY = t.clientY;
              origLeft = icon.offsetLeft;
              origTop = icon.offsetTop;
              moved = false;
              e.stopPropagation();
            },
            { passive: true },
          );

          icon.addEventListener(
            "touchmove",
            (e) => {
              const t = e.touches[0];
              const dx = t.clientX - startX;
              const dy = t.clientY - startY;
              if (!moved && Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
              moved = true;
              icon.classList.add("dragging");
              const nx = Math.max(
                0,
                Math.min(origLeft + dx, window.innerWidth - icon.offsetWidth),
              );
              const ny = Math.max(
                0,
                Math.min(
                  origTop + dy,
                  window.innerHeight - 34 - icon.offsetHeight,
                ),
              );
              icon.style.left = nx + "px";
              icon.style.top = ny + "px";
              e.preventDefault();
            },
            { passive: false },
          );

          icon.addEventListener("touchend", () => {
            icon.classList.remove("dragging");
            if (!moved) openWindow(icon.dataset.target);
          });
        });
      })();

      /* =========================================================
   BOOT: open about automatically
========================================================= */
      window.addEventListener("load", () => {
        setTimeout(() => openWindow("about"), 200);
      });

      /* =========================================================
   CLOSE mobile windows by tapping teal desktop area
========================================================= */
      document.getElementById("desktop").addEventListener("click", (e) => {
        if (!isMobile()) return;
        if (e.target.closest(".window") || e.target.closest(".icon")) return;
        // close topmost open window
        const entries = Object.entries(openWindows).filter(
          ([, w]) => !w.minimized,
        );
        if (!entries.length) return;
        entries.sort(
          ([, a], [, b]) =>
            parseInt(b.el.style.zIndex) - parseInt(a.el.style.zIndex),
        );
        closeWindow(entries[0][0]);
      });
    </script>
  </body>
